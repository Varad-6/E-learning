version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: elearning-postgres

    restart: always

    environment:
      POSTGRES_USER: elearning_user
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elearning

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: